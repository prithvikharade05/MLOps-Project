version: '3.8'

services:
  frontend:
    build: 
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - btc-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/btc_forecast
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./btc_forecasting:/app
    depends_on:
      - postgres
      - redis
      - mlflow
    networks:
      - btc-network

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A tasks.celery_app worker --loglevel=info -Q data,features,training,monitoring
    volumes:
      - ./btc_forecasting:/app
    depends_on:
      - redis
      - backend
    networks:
      - btc-network

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A tasks.celery_app beat --loglevel=info
    volumes:
      - ./btc_forecasting:/app
    depends_on:
      - redis
      - backend
    networks:
      - btc-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - btc-network

networks:
  btc-network:
    driver: bridge

